<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII.PRO | Live Engine</title>
    <style>
        :root { --bg: #000; --ui: #1a1a1a; --accent: #ffffff; }
        body { background: var(--bg); color: #fff; font-family: 'SF Mono', monospace; margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        
        #toolbar { background: var(--ui); padding: 12px 20px; display: flex; gap: 15px; align-items: center; border-bottom: 1px solid #333; z-index: 10; font-size: 10px; }
        .group { display: flex; align-items: center; gap: 8px; border-right: 1px solid #333; padding-right: 15px; }
        
        .btn { background: #333; border: 1px solid #444; color: #fff; padding: 6px 12px; cursor: pointer; font-size: 9px; text-transform: uppercase; transition: 0.2s; }
        .btn:hover { background: #555; }
        .btn.active { background: var(--accent); color: #000; border: none; font-weight: bold; }
        
        select, input[type="range"] { background: #000; color: #fff; border: 1px solid #444; font-size: 9px; padding: 4px; }
        input[type="range"] { width: 60px; height: 2px; appearance: none; }

        #container { flex: 1; display: flex; justify-content: center; align-items: center; background: #000; }
        canvas { max-width: 100%; max-height: 100%; image-rendering: pixelated; }
        
        #stats { margin-left: auto; opacity: 0.5; }
        #file-input { display: none; }
    </style>
</head>
<body>

<div id="toolbar">
    <button id="webcam-btn" class="btn" onclick="startWebcam()">Live Camera</button>
    <label class="btn">Upload File<input type="file" id="file-input" accept="image/*,video/*"></label>
    
    <div class="group">
        <span>Style</span>
        <select id="style-select">
            <option value="Classic">Classic</option>
            <option value="Blocks">Blocks</option>
            <option value="Binary">Binary</option>
            <option value="Cyber">Cyber</option>
        </select>
    </div>

    <div class="group">
        <span>Res</span>
        <input type="range" id="res" min="5" max="25" value="12">
    </div>

    <div class="group">
        <span>Gamma</span>
        <input type="range" id="gamma" min="0.5" max="3.0" step="0.1" value="1.0">
    </div>

    <button class="btn active" onclick="autoOptimize()">AI AUTO-FIX</button>
    <button class="btn" onclick="takeSnapshot()">Export</button>

    <div id="stats">00 FPS</div>
</div>

<div id="container">
    <canvas id="out"></canvas>
</div>

<script>
/**
 * LIVE ASCII MULTI-ENGINE
 */
const outCanvas = document.getElementById('out');
const ctx = outCanvas.getContext('2d', { alpha: false });
const resSlider = document.getElementById('res');
const gammaSlider = document.getElementById('gamma');
const styleSelect = document.getElementById('style-select');
const fileInput = document.getElementById('file-input');
const stats = document.getElementById('stats');
const webcamBtn = document.getElementById('webcam-btn');

let currentSource = document.createElement('video');
currentSource.loop = true; currentSource.muted = true; currentSource.crossOrigin = "anonymous";
currentSource.playsInline = true;

let pCanvas = new OffscreenCanvas(1, 1);
let pCtx = pCanvas.getContext('2d', { willReadFrequently: true });

const STYLES = {
    Classic: " .:-=+*#%@".split(""),
    Blocks: " ░▒▓█".split(""),
    Binary: "01".split(""),
    Cyber: "日ﾊﾐﾋｰｳｼﾅﾓﾆｻﾜﾂｵﾘｱﾎﾃﾏｹﾒｴｶｷﾑﾕﾗｾ".split("")
};

let lastTime = 0;
let useWebcam = false;

// INITIAL LOAD (Sample Video)
window.onload = () => {
    currentSource.src = "https://www.w3schools.com/html/mov_bbb.mp4"; 
    currentSource.play();
    requestAnimationFrame(loop);
};

// WEBCAM LOGIC
async function startWebcam() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        currentSource.srcObject = stream;
        currentSource.play();
        useWebcam = true;
        webcamBtn.classList.add('active');
    } catch (err) {
        alert("Camera access denied.");
    }
}

fileInput.onchange = (e) => {
    useWebcam = false;
    webcamBtn.classList.remove('active');
    currentSource.srcObject = null;
    currentSource.src = URL.createObjectURL(e.target.files[0]);
    currentSource.play();
};

function autoOptimize() {
    pCtx.drawImage(currentSource, 0, 0, 50, 50);
    const data = pCtx.getImageData(0, 0, 50, 50).data;
    let brightness = 0;
    for(let i=0; i<data.length; i+=4) {
        brightness += (0.2126*data[i] + 0.7152*data[i+1] + 0.0722*data[i+2]);
    }
    const avg = brightness / (data.length/4);
    gammaSlider.value = avg < 100 ? 0.7 : 1.5;
    console.log("AI: Re-calibrated for environment.");
}

function loop(now) {
    stats.innerText = `${Math.round(1000/(now-lastTime))} FPS`;
    lastTime = now;
    render();
    requestAnimationFrame(loop);
}

function render() {
    // Get dimensions from source (handles webcam or video)
    const w = currentSource.videoWidth || currentSource.width || 640;
    const h = currentSource.videoHeight || currentSource.height || 480;
    
    const gap = parseInt(resSlider.value);
    const gamma = parseFloat(gammaSlider.value);
    const charSet = STYLES[styleSelect.value];

    // Character Aspect Ratio Correction (Standard mono is ~1:1.8)
    const vGap = gap * 1.8;
    const sampleW = Math.floor(w / gap);
    const sampleH = Math.floor(h / vGap);

    if (outCanvas.width !== w || outCanvas.height !== h) {
        outCanvas.width = w; outCanvas.height = h;
        pCanvas.width = sampleW; pCanvas.height = sampleH;
    }

    pCtx.drawImage(currentSource, 0, 0, sampleW, sampleH);
    const pixels = pCtx.getImageData(0, 0, sampleW, sampleH).data;

    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = "#fff";
    ctx.font = `bold ${gap}px monospace`;
    ctx.textBaseline = "top";

    for (let y = 0; y < sampleH; y++) {
        for (let x = 0; x < sampleW; x++) {
            const i = (y * sampleW + x) * 4;
            let l = (0.2126*pixels[i] + 0.7152*pixels[i+1] + 0.0722*pixels[i+2]) / 255;
            l = Math.pow(l, 1/gamma);

            const char = charSet[Math.floor(l * (charSet.length - 1))];
            if (char && char !== " ") {
                ctx.fillText(char, x * gap, y * vGap);
            }
        }
    }
}

function takeSnapshot() {
    const link = document.createElement('a');
    link.download = `ascii-pro-capture.png`;
    link.href = outCanvas.toDataURL('image/png');
    link.click();
}
</script>
</body>
</html>
