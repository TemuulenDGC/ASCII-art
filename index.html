<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ASCII.PRO | Hardened Engine</title>
    <style>
        :root { --bg: #000; --ui: #151515; --accent: #fff; --error: #ff4444; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        
        #toolbar { background: var(--ui); padding: 10px 20px; display: flex; gap: 15px; align-items: center; border-bottom: 1px solid #333; flex-wrap: wrap; }
        .group { display: flex; align-items: center; gap: 8px; border-right: 1px solid #333; padding-right: 15px; }
        
        .btn { background: #222; border: 1px solid #444; color: #fff; padding: 6px 12px; cursor: pointer; font-size: 10px; text-transform: uppercase; }
        .btn:hover { background: #444; }
        .btn.active { background: var(--accent); color: #000; border: none; font-weight: bold; }
        
        #canvas-container { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; position: relative; }
        canvas { max-width: 100%; max-height: 90vh; background: #000; }
        
        #debug-log { position: absolute; bottom: 10px; left: 10px; font-size: 9px; color: #555; pointer-events: none; max-width: 300px; }
        #stats { margin-left: auto; font-size: 10px; color: #666; }
        input[type="file"] { display: none; }
        select { background: #000; color: #fff; border: 1px solid #444; font-size: 10px; }
    </style>
</head>
<body>

<div id="toolbar">
    <button id="cam-btn" class="btn" onclick="toggleWebcam()">Camera: OFF</button>
    <label class="btn">Upload File<input type="file" id="file-input" accept="image/*,video/*"></label>
    
    <div class="group">
        <span>Style</span>
        <select id="style-select">
            <option value="Classic">Classic</option>
            <option value="Blocks">Blocks</option>
            <option value="Cyber">Cyber</option>
        </select>
    </div>

    <div class="group">
        <span>Res</span>
        <input type="range" id="res" min="6" max="24" value="12">
    </div>

    <button class="btn" onclick="autoFix()" style="border-color: #666;">AI Auto-Fix</button>
    <button class="btn" onclick="downloadImg()">Export</button>

    <div id="stats">Ready</div>
</div>

<div id="canvas-container">
    <canvas id="out"></canvas>
    <div id="debug-log">Engine initialized...</div>
</div>

<script>
/** * HARDENED CORE LOGIC
 */
const log = (msg) => { document.getElementById('debug-log').innerText = `LOG: ${msg}`; console.log(msg); };
const outCanvas = document.getElementById('out');
const ctx = outCanvas.getContext('2d', { alpha: false, desynchronized: true });
const resSlider = document.getElementById('res');
const styleSelect = document.getElementById('style-select');
const stats = document.getElementById('stats');

let source = document.createElement('video');
source.muted = true; source.loop = true; source.crossOrigin = "anonymous"; source.setAttribute('playsinline', '');

let pCanvas = new OffscreenCanvas(1, 1);
let pCtx = pCanvas.getContext('2d', { willReadFrequently: true });

const CHARS = {
    Classic: " .:-=+*#%@".split(""),
    Blocks: " ░▒▓█".split(""),
    Cyber: "日ﾊﾐﾋｰｳｼﾅﾓﾆｻﾜﾂｵﾘｱﾎﾃﾏｹﾒｴｶｷﾑﾕﾗｾ".split("")
};

let isCam = false;
let lastUpdate = 0;

// 1. HARDENED STARTUP
window.onload = () => {
    log("Loading demo video...");
    // Using a reliable sample URL
    source.src = "https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4";
    source.oncanplay = () => { source.play(); log("Demo playing."); requestAnimationFrame(loop); };
    source.onerror = () => log("Source Error: Check CORS or File Type.");
};

// 2. WEBCAM TOGGLE (with Permission Handling)
async function toggleWebcam() {
    if (!isCam) {
        try {
            log("Requesting camera...");
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            source.srcObject = stream;
            source.onloadedmetadata = () => {
                source.play();
                isCam = true;
                document.getElementById('cam-btn').innerText = "Camera: ON";
                document.getElementById('cam-btn').classList.add('active');
                log("Camera active.");
            };
        } catch (err) {
            log("Camera Denied: " + err.message);
        }
    } else {
        location.reload(); // Hard reset for clean stream closure
    }
}

// 3. FILE UPLOAD
document.getElementById('file-input').onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    log("File loaded: " + file.name);
    source.srcObject = null;
    source.src = URL.createObjectURL(file);
    source.play();
};

function autoFix() {
    resSlider.value = 10;
    log("AI: Resetting Resolution for clarity.");
}

function loop(now) {
    const dt = now - lastUpdate;
    lastUpdate = now;
    stats.innerText = `${Math.round(1000/dt)} FPS`;
    
    if (source.readyState >= 2) render(); // Only draw if data is available
    requestAnimationFrame(loop);
}

function render() {
    const w = source.videoWidth || 640;
    const h = source.videoHeight || 480;
    const gap = parseInt(resSlider.value);
    const vGap = gap * 1.8; // Aspect ratio fix

    const sw = Math.floor(w / gap);
    const sh = Math.floor(h / vGap);

    if (outCanvas.width !== w) {
        outCanvas.width = w; outCanvas.height = h;
        pCanvas.width = sw; pCanvas.height = sh;
        log(`Buffer Resized: ${sw}x${sh}`);
    }

    // Capture frame to processing canvas
    pCtx.drawImage(source, 0, 0, sw, sh);
    const pixels = pCtx.getImageData(0, 0, sw, sh).data;

    // Drawing
    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = "#fff";
    ctx.font = `bold ${gap}px monospace`;
    ctx.textBaseline = "top";

    const set = CHARS[styleSelect.value];

    for (let y = 0; y < sh; y++) {
        for (let x = 0; x < sw; x++) {
            const i = (y * sw + x) * 4;
            // Perceptual brightness
            const l = (0.2126*pixels[i] + 0.7152*pixels[i+1] + 0.0722*pixels[i+2]) / 255;
            const char = set[Math.floor(l * (set.length - 1))];
            
            if (char && char !== " ") {
                ctx.fillText(char, x * gap, y * vGap);
            }
        }
    }
}

function downloadImg() {
    const link = document.createElement('a');
    link.download = 'ascii-art.png';
    link.href = outCanvas.toDataURL();
    link.click();
}
</script>
</body>
</html>
